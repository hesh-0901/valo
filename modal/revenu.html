<div id="modal-revenu" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
    <div class="w-full max-w-md bg-valoCard border border-slate-800/90 rounded-[2rem] p-6 shadow-2xl relative overflow-hidden">
        
        <div class="absolute top-0 right-0 w-32 h-32 bg-valoMint/5 rounded-full blur-3xl pointer-events-none"></div>

        <button id="close-modal-revenu" type="button" class="absolute right-6 top-6 w-8 h-8 rounded-xl bg-slate-900/60 border border-slate-800/40 flex items-center justify-center text-valoSlate hover:text-white transition-all active:scale-90">
            <i class="bi bi-x-lg text-xs"></i>
        </button>
        
        <div class="flex items-center gap-3 mb-6 relative z-10">
            <div class="w-10 h-10 rounded-xl flex items-center justify-center bg-valoMint/10 text-valoMint text-lg shadow-inner">
                <i class="bi bi-arrow-down-left-circle-fill"></i>
            </div>
            <div>
                <h2 class="text-base font-black tracking-tight text-white">Nouvelle Entrée (Revenu)</h2>
                <p class="text-valoSlate text-[10px] uppercase font-bold tracking-wider font-mono">Indexation de flux entrant</p>
            </div>
        </div>

        <form id="form-revenu" class="space-y-4 relative z-10">
            
            <div class="grid grid-cols-12 gap-3 items-end">
                <div id="wrapper-amount" class="col-span-7 space-y-1.5">
                    <label class="text-[9px] font-black uppercase tracking-widest text-valoSlate ml-1">Montant</label>
                    <div class="relative flex items-center">
                        <span id="currency-symbol" class="absolute left-4 text-valoMint font-black font-mono text-sm">$</span>
                        <input type="number" id="rev-amount" step="0.01" required class="w-full bg-slate-900/80 border border-slate-800 focus:border-valoMint rounded-xl py-3 pl-8 pr-4 text-sm font-mono font-bold text-white focus:outline-none transition-colors" placeholder="0.00">
                    </div>
                </div>

                <div class="col-span-5 flex items-center justify-center bg-slate-900/40 border border-slate-800 h-[46px] rounded-xl px-2">
                    <label class="flex items-center gap-2 cursor-pointer select-none">
                        <input type="checkbox" id="rev-is-cdf" class="w-4 h-4 rounded border-slate-700 bg-slate-950 text-valoMint focus:ring-valoMint focus:ring-offset-slate-900 accent-valoMint">
                        <span class="text-[10px] font-black text-slate-300 tracking-wider">DEVISE CDF</span>
                    </label>
                </div>

                <div id="wrapper-rate" class="hidden col-span-12 space-y-1.5 transition-all">
                    <label class="text-[9px] font-black uppercase tracking-widest text-valoSlate ml-1">Taux de change appliqué (1 USD = ? CDF)</label>
                    <input type="number" id="rev-rate" class="w-full bg-slate-900/80 border border-slate-800 focus:border-valoMint rounded-xl py-2.5 px-4 text-xs font-mono text-white focus:outline-none" placeholder="0">
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-[9px] font-black uppercase tracking-widest text-valoSlate ml-1">Catégorie</label>
                <input type="text" id="rev-category" readonly required class="w-full bg-slate-900/50 border border-slate-800/80 rounded-xl py-2.5 px-4 text-xs text-slate-400 cursor-not-allowed focus:outline-none" placeholder="Sélectionnez une catégorie ci-dessous...">
                
                <div id="modal-rev-tags" class="flex flex-wrap gap-1.5 max-h-16 overflow-y-auto pr-1 pt-1">
                    </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-[9px] font-black uppercase tracking-widest text-valoSlate ml-1">Motif descriptif</label>
                <input type="text" id="rev-motif" required class="w-full bg-slate-900/80 border border-slate-800 focus:border-valoMint rounded-xl py-2.5 px-4 text-xs text-white focus:outline-none transition-colors" placeholder="Ex: Avance pour confection du costume slim bleu...">
            </div>

            <div class="space-y-1.5 relative">
                <label class="text-[9px] font-black uppercase tracking-widest text-valoSlate ml-1">Partenaire lié (Optionnel)</label>
                <div class="relative flex items-center">
                    <i class="bi bi-person-search absolute left-4 text-slate-500 text-xs"></i>
                    <input type="text" id="rev-partner" autocomplete="off" class="w-full bg-slate-900/80 border border-slate-800 focus:border-valoMint rounded-xl py-2.5 pl-9 pr-4 text-xs text-white focus:outline-none transition-colors" placeholder="Rechercher un tiers...">
                </div>
                <div id="modal-partner-suggestions" class="hidden absolute left-0 right-0 mt-1 bg-slate-950 border border-slate-800 rounded-xl max-h-32 overflow-y-auto p-1 z-50 shadow-2xl"></div>
            </div>

            <div class="space-y-1.5">
                <label class="text-[9px] font-black uppercase tracking-widest text-valoSlate ml-1">Date d'opération</label>
                <input type="date" id="rev-date" required class="w-full bg-slate-900/80 border border-slate-800 focus:border-valoMint rounded-xl py-2.5 px-4 text-xs font-mono text-white focus:outline-none transition-colors">
            </div>

            <button type="submit" id="submit-revenu" class="w-full bg-valoMint hover:bg-valoMintHover text-valoMidnight font-black py-3.5 rounded-xl transition flex items-center justify-center gap-2 text-[10px] uppercase tracking-widest mt-6 shadow-lg shadow-valoMint/10 active:scale-[0.99]">
                <span>Enregistrer le revenu</span><i class="bi bi-check-circle-fill text-xs"></i>
            </button>
        </form>
    </div>
</div>
