<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALO - Portefeuille Virtuel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        valoMidnight: '#0F172A',
                        valoMint: '#10B981',
                        valoMintHover: '#059669',
                        valoSlate: '#64748B',
                        valoCard: '#1E293B',
                        valoCrimson: '#EF4444'
                    }
                }
            }
        }
    </script>

    <link rel="shortcut icon" type="image/x-icon" href="icons/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
    <link rel="manifest" href="manifest.json">
</head>
<body class="bg-valoMidnight text-white h-full font-sans antialiased flex items-center justify-center p-4 relative overflow-hidden">

    <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(16,185,129,0.04),transparent_60%)] pointer-events-none"></div>

    <div class="w-full max-w-[440px] bg-valoCard border border-slate-800/80 rounded-[2rem] p-6 md:p-10 shadow-2xl z-10">
        
        <div class="text-center mb-8">
            <img src="valo.png" alt="VALO" class="h-12 mx-auto mb-3 object-contain">
            <h2 class="text-xl font-black tracking-tight">Connexion à votre espace</h2>
            <p class="text-valoSlate text-xs mt-1">Gérez vos finances en toute sécurité</p>
        </div>

        <div id="login-error" class="hidden mb-4 p-4 bg-valoCrimson/10 border border-valoCrimson/20 rounded-xl text-valoCrimson text-xs flex items-center gap-3">
            <i class="bi bi-shield-exclamation text-lg shrink-0"></i>
            <span id="login-error-text">Identifiants incorrects.</span>
        </div>

        <form id="login-form" class="space-y-4">
            <div class="space-y-1.5">
                <label class="text-[10px] font-bold uppercase tracking-[0.15em] text-valoSlate ml-1">Nom d'utilisateur</label>
                <div class="relative flex items-center">
                    <span class="absolute left-4 text-valoMint font-black text-sm select-none">@</span>
                    <input type="text" id="login-username" required autocomplete="username" class="w-full bg-slate-900/60 border border-slate-800/80 focus:border-valoMint rounded-xl py-3.5 pl-9 pr-4 text-sm text-white focus:outline-none transition-all font-medium" placeholder="pseudo">
                </div>
            </div>

            <div class="space-y-1.5">
                <div class="flex justify-between items-center px-1">
                    <label class="text-[10px] font-bold uppercase tracking-[0.15em] text-valoSlate">Mot de passe</label>
                    <a href="#" class="text-[10px] font-bold text-valoSlate hover:text-valoMint transition">Oublié ?</a>
                </div>
                <div class="relative flex items-center">
                    <i class="bi bi-lock absolute left-4 text-valoSlate text-base"></i>
                    <input type="password" id="login-password" required autocomplete="current-password" class="w-full bg-slate-900/60 border border-slate-800/80 focus:border-valoMint rounded-xl py-3.5 pl-12 pr-12 text-sm text-white focus:outline-none transition-all">
                    <button type="button" id="toggle-login-pass" class="absolute right-4 text-valoSlate hover:text-white transition">
                        <i class="bi bi-eye text-base"></i>
                    </button>
                </div>
            </div>

            <button type="submit" id="btn-login" class="w-full bg-valoMint hover:bg-valoMintHover text-valoMidnight font-black py-4 rounded-xl transition shadow-lg shadow-valoMint/5 flex items-center justify-center gap-2 uppercase text-xs tracking-wider mt-6">
                <span>Se connecter</span>
                <i class="bi bi-arrow-right-short text-lg"></i>
            </button>
        </form>

        <div class="mt-6 pt-4 border-t border-slate-800/60 flex items-center justify-between">
            <span class="text-xs text-valoSlate">Nouveau sur VALO ?</span>
            <a href="./profil/register.html" class="text-xs font-bold text-valoMint hover:text-white transition flex items-center gap-2 tracking-wider uppercase">
                S'enregistrer <i class="bi bi-person-plus-fill text-sm"></i>
            </a>
        </div>
    </div>

    <script type="module">
        import { loginWithUsername } from './js/config.js';

        document.addEventListener("DOMContentLoaded", () => {
            const form = document.getElementById('login-form');
            const passInput = document.getElementById('login-password');
            const togglePass = document.getElementById('toggle-login-pass');
            const errorZone = document.getElementById('login-error');
            const errorText = document.getElementById('login-error-text');

            // Toggle Affichage Mot de passe
            togglePass.addEventListener('click', () => {
                const icon = togglePass.querySelector('i');
                if (passInput.type === 'password') {
                    passInput.type = 'text';
                    icon.classList.replace('bi-eye', 'bi-eye-slash');
                } else {
                    passInput.type = 'password';
                    icon.classList.replace('bi-eye-slash', 'bi-eye');
                }
            });

            // Connexion
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const username = document.getElementById('login-username').value.trim().toLowerCase();
                const secret = passInput.value;
                const btn = document.getElementById('btn-login');

                errorZone.classList.add('hidden');
                btn.disabled = true;
                btn.querySelector('span').textContent = "VÉRIFICATION...";

                try {
                    await loginWithUsername(username, secret);
                    window.location.href = "./dashboard.html";
                } catch (err) {
                    errorZone.classList.remove('hidden');
                    errorText.textContent = "Nom d'utilisateur ou mot de passe invalide.";
                    console.error(err);
                } finally {
                    btn.disabled = false;
                    btn.querySelector('span').textContent = "Se connecter";
                }
            });
        });
    </script>
</body>
</html>
