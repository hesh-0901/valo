<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VALO - Access Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        valoMidnight: '#0F172A',
                        valoMint: '#10B981',
                        valoMintHover: '#059669',
                        valoSlate: '#64748B',
                        valoCard: '#1E293B',
                        valoInput: '#0F172A', // Inputs plus sombres pour contraster avec la carte
                        valoCrimson: '#EF4444'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        html, body {
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }
    </style>
    <link rel="manifest" href="manifest.json">
</head>
<body class="bg-valoMidnight text-white h-full flex items-center justify-center p-3 md:p-6 select-none">

    <div class="w-full max-w-sm md:max-w-3xl h-[85vh] md:h-[480px] bg-valoCard rounded-2xl md:rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row border border-slate-800/50">
        
        <div class="hidden md:flex w-1/2 bg-gradient-to-br from-valoMint via-emerald-600 to-teal-700 p-8 flex-col justify-between text-white relative">
            <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-white/10 rounded-full blur-xl"></div>
            <div class="absolute -top-10 -right-10 w-40 h-40 bg-white/10 rounded-full blur-xl"></div>
            
            <div class="flex items-center gap-2 z-10">
                <img src="valo.png" alt="VALO" class="h-5 brightness-0 invert">
            </div>

            <div class="space-y-2 z-10">
                <h1 class="text-xl font-black tracking-tight">Welcome Back !</h1>
                <p class="text-emerald-50/70 text-[11px] leading-relaxed">Pour rester connecté avec votre portefeuille virtuel, veuillez vous identifier.</p>
            </div>

            <div class="z-10">
                <p class="text-[9px] text-emerald-100/40 font-mono tracking-wider uppercase">Valo Network v1.0.7</p>
            </div>
        </div>

        <div class="md:hidden w-full bg-gradient-to-r from-valoMint to-emerald-600 p-3.5 text-white flex items-center justify-between shrink-0">
            <img src="valo.png" alt="VALO" class="h-4 brightness-0 invert">
            <span class="text-[9px] font-extrabold uppercase tracking-widest bg-white/20 px-2 py-0.5 rounded">Portail</span>
        </div>

        <div class="w-full md:w-1/2 bg-valoCard p-5 md:p-8 flex flex-col justify-center overflow-y-auto h-full">
            
            <div class="text-center md:text-left mb-5">
                <h2 class="text-base md:text-lg font-black text-white tracking-tight">Ouvrir la session</h2>
                <p class="text-valoSlate text-[10px] md:text-xs mt-0.5">Saisissez vos paramètres d'accès</p>
            </div>

            <div id="login-error" class="hidden mb-4 p-2.5 bg-valoCrimson/10 border border-valoCrimson/30 text-valoCrimson rounded-xl text-[10px] font-semibold flex items-center gap-2">
                <i class="bi bi-exclamation-circle-fill shrink-0"></i>
                <span id="login-error-text">Accès refusé.</span>
            </div>

            <form id="login-form" class="space-y-3">
                
                <div class="space-y-1">
                    <label class="text-[9px] font-bold text-valoSlate ml-1 uppercase tracking-wider">Identifiant</label>
                    <div class="relative flex items-center">
                        <span class="absolute left-3.5 text-valoSlate text-xs"><i class="bi bi-person-fill"></i></span>
                        <input type="text" id="login-username" required 
                            class="w-full bg-valoInput border border-slate-800/80 focus:border-valoMint rounded-xl py-2 pl-9 pr-3 text-[11px] font-mono font-medium text-slate-200 focus:outline-none transition-all" 
                            placeholder="Username">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[9px] font-bold text-valoSlate ml-1 uppercase tracking-wider">Code Secret</label>
                    <div class="relative flex items-center">
                        <span class="absolute left-3.5 text-valoSlate text-xs"><i class="bi bi-lock-fill"></i></span>
                        <input type="password" id="login-password" required 
                            class="w-full bg-valoInput border border-slate-800/80 focus:border-valoMint rounded-xl py-2 pl-9 pr-9 text-[11px] font-mono font-medium text-slate-200 focus:outline-none transition-all" 
                            placeholder="••••••••">
                        <button type="button" id="toggle-login-pass" class="absolute right-3 text-valoSlate hover:text-white text-xs transition-colors p-1">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" id="btn-login" class="w-full bg-valoMint hover:bg-valoMintHover text-valoMidnight font-extrabold py-2.5 rounded-xl transition-all flex items-center justify-center gap-1.5 text-[10px] uppercase tracking-widest mt-4 shadow-md shadow-valoMint/10">
                    <span id="btn-text">SIGN IN</span>
                    <i class="bi bi-arrow-right-short text-sm"></i>
                </button>
            </form>

            <div class="mt-5 text-center space-y-2">
                <a href="./profil/register.html" class="inline-block text-[9px] font-bold text-valoSlate hover:text-white transition-colors tracking-wide uppercase">
                    Créer un nouvel index <i class="bi bi-chevron-right text-[7px]"></i>
                </a>
                <div class="h-[1px] w-8 bg-slate-800/80 mx-auto md:hidden"></div>
                <p class="md:hidden text-[8px] text-slate-600 font-mono tracking-widest uppercase">VALO SYSTEM v1.0.7</p>
            </div>

        </div>
    </div>

    <script type="module">
        import { loginWithUsername } from './js/config.js';

        document.addEventListener("DOMContentLoaded", () => {
            const form = document.getElementById('login-form');
            const passInput = document.getElementById('login-password');
            const togglePass = document.getElementById('toggle-login-pass');
            const errorZone = document.getElementById('login-error');
            const errorText = document.getElementById('login-error-text');
            const btnLogin = document.getElementById('btn-login');
            const btnText = document.getElementById('btn-text');

            togglePass.addEventListener('click', () => {
                const icon = togglePass.querySelector('i');
                if (passInput.type === 'password') {
                    passInput.type = 'text';
                    icon.classList.replace('bi-eye', 'bi-eye-slash');
                } else {
                    passInput.type = 'password';
                    icon.classList.replace('bi-eye-slash', 'bi-eye');
                }
            });

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const username = document.getElementById('login-username').value.trim().toLowerCase();
                const secret = passInput.value;

                errorZone.classList.add('hidden');
                btnLogin.disabled = true;
                btnText.textContent = "VERIFICATION...";

                try {
                    await loginWithUsername(username, secret);
                    window.location.href = "./dashboard.html";
                } catch (err) {
                    errorZone.classList.remove('hidden');
                    errorText.textContent = "Paramètres invalides.";
                    btnLogin.disabled = false;
                    btnText.textContent = "SIGN IN";
                }
            });
        });
    </script>
</body>
</html>
