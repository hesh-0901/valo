<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VALO — Centre de Configuration</title>
    
    <link rel="icon" type="image/x-icon" href="../icons/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../icons/favicon-32x32.png">
    <link rel="apple-touch-icon" href="../icons/apple-touch-icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        valoMidnight: '#020617',
                        valoMint: '#10B981',
                        valoMintHover: '#059669',
                        valoSlate: '#475569',
                        valoCard: '#0F172A',
                        valoInput: '#020617'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        .profile-mesh { background: radial-gradient(circle at 100% 0%, rgba(16, 185, 129, 0.08), transparent 60%); }
        
        /* Animation fluide et robuste pour le volet déroulant */
        .accordion-content { 
            max-height: 0; 
            overflow: hidden; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            opacity: 0; 
        }
        .accordion-item.active .accordion-content { 
            max-height: 1000px; 
            opacity: 1; 
            padding-top: 16px;
        }
        .accordion-item.active .bi-chevron-down { 
            transform: rotate(180deg); 
            color: #10B981; 
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="bg-valoMidnight text-slate-200 min-h-full p-4 md:p-12 select-none antialiased flex justify-center items-start">

    <div class="w-full max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-12 gap-6 lg:gap-8 items-start">
        
        <div class="md:col-span-4 space-y-4 md:sticky md:top-12">
            <div class="flex items-center justify-between py-1">
                <button onclick="window.location.href='../dashboard.html'" class="w-9 h-9 flex items-center justify-center rounded-xl bg-slate-900 border border-slate-800/80 text-valoSlate hover:text-white transition-all active:scale-95">
                    <i class="bi bi-arrow-left text-sm"></i>
                </button>
                <h1 class="text-[9px] font-black uppercase tracking-[0.35em] text-valoSlate font-mono">Configuration</h1>
                <div class="w-9"></div>
            </div>

            <div class="bg-valoCard border border-slate-800/60 rounded-3xl p-6 relative overflow-hidden profile-mesh shadow-2xl">
                <div class="flex flex-col items-center text-center space-y-3 relative z-10">
                    <div class="relative">
                        <img id="set-avatar" src="../valo.png" class="w-20 h-20 rounded-2xl border border-slate-700/40 shadow-inner object-cover" alt="Avatar">
                        <label for="file-avatar" class="absolute -bottom-1 -right-1 bg-valoMint text-valoMidnight w-6 h-6 rounded-lg flex items-center justify-center cursor-pointer shadow-md transition-transform active:scale-95">
                            <i class="bi bi-camera-fill text-[10px]"></i>
                        </label>
                        <input type="file" id="file-avatar" class="hidden" accept="image/*">
                    </div>
                    <div class="space-y-0.5 w-full min-w-0">
                        <h2 id="set-fullname" class="text-base font-extrabold tracking-tight text-white truncate">Chargement...</h2>
                        <p id="set-username" class="text-[10px] font-bold text-valoMint uppercase tracking-widest font-mono truncate">@username</p>
                        <p id="set-email" class="text-[10px] text-slate-500 font-medium truncate pt-1"></p>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-2 mt-5 pt-4 border-t border-slate-800/40">
                    <div class="bg-slate-950/40 rounded-xl p-2.5 border border-slate-800/30 text-center">
                        <span class="text-[7px] uppercase font-black text-valoSlate tracking-widest block mb-0.5">Membre depuis</span>
                        <span id="set-joined" class="text-[10px] font-mono text-slate-300 font-bold">--/--/----</span>
                    </div>
                    <div class="bg-slate-950/40 rounded-xl p-2.5 border border-slate-800/30 text-center">
                        <span class="text-[7px] uppercase font-black text-valoSlate tracking-widest block mb-0.5">Vérification</span>
                        <span class="text-[10px] font-bold text-valoMint uppercase flex items-center justify-center gap-1"><i class="bi bi-shield-check"></i> Actif</span>
                    </div>
                </div>
            </div>

            <button id="btn-logout-settings" class="w-full py-3.5 bg-slate-950/40 hover:bg-red-500/5 border border-slate-900 rounded-2xl text-[9px] font-black uppercase tracking-[0.25em] text-red-500/40 hover:text-red-500 transition-all active:scale-95">Clôturer la session active</button>
        </div>

        <div class="md:col-span-8 space-y-3">
            
            <div class="bg-valoCard border border-slate-800/50 rounded-2xl p-5 shadow-lg accordion-item transition-all duration-200">
                <button class="w-full flex items-center justify-between text-left outline-none accordion-trigger">
                    <span class="flex items-center gap-2.5">
                        <i class="bi bi-currency-exchange text-valoMint text-sm"></i>
                        <h4 class="text-[10px] font-black uppercase tracking-wider text-slate-300">Taux de conversion</h4>
                    </span>
                    <i class="bi bi-chevron-down text-xs text-valoSlate transition-transform duration-200"></i>
                </button>
                
                <div class="accordion-content space-y-4">
                    <p class="text-[10px] text-slate-500 leading-normal">Ajustez le taux local CDF appliqué à vos portefeuilles.</p>
                    <div class="flex gap-2">
                        <div class="flex-grow space-y-1">
                            <label class="text-[8px] font-black text-valoSlate uppercase ml-1">1 USD ($) =</label>
                            <input type="number" id="set-rate" class="w-full bg-valoInput border border-slate-800 rounded-xl py-2.5 px-3 text-xs font-mono text-white focus:outline-none focus:border-valoMint" placeholder="Ex: 2850">
                        </div>
                        <div class="space-y-1 w-1/3">
                            <label class="text-[8px] font-black text-valoSlate uppercase ml-1">Périodicité</label>
                            <select id="set-period" class="w-full h-[41px] bg-valoInput border border-slate-800 rounded-xl px-2 text-[10px] font-medium text-white focus:outline-none">
                                <option value="daily">Aujourd'hui</option>
                                <option value="weekly">Semaine</option>
                                <option value="fixed">Fixé</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-valoCard border border-slate-800/50 rounded-2xl p-5 shadow-lg accordion-item transition-all duration-200">
                <button class="w-full flex items-center justify-between text-left outline-none accordion-trigger">
                    <span class="flex items-center gap-2.5">
                        <i class="bi bi-people-fill text-valoMint text-sm"></i>
                        <h4 class="text-[10px] font-black uppercase tracking-wider text-slate-300">Contacts récurrents</h4>
                    </span>
                    <i class="bi bi-chevron-down text-xs text-valoSlate transition-transform duration-200"></i>
                </button>
                
                <div class="accordion-content space-y-4">
                    <div id="set-partners-list" class="space-y-1.5 max-h-36 overflow-y-auto pr-1"></div>
                    <div class="flex gap-2 pt-1">
                        <input type="text" id="add-partner-input" class="flex-grow bg-valoInput border border-slate-800 rounded-xl py-2 px-3 text-xs text-white focus:outline-none focus:border-valoMint" placeholder="Nom du partenaire">
                        <button id="btn-add-partner" class="w-9 h-9 bg-valoMint hover:bg-valoMintHover text-valoMidnight rounded-xl flex items-center justify-center shrink-0 active:scale-95 transition-transform"><i class="bi bi-plus-lg text-sm"></i></button>
                    </div>
                </div>
            </div>

            <div class="bg-valoCard border border-slate-800/50 rounded-2xl p-5 shadow-lg accordion-item transition-all duration-200">
                <button class="w-full flex items-center justify-between text-left outline-none accordion-trigger">
                    <span class="flex items-center gap-2.5">
                        <i class="bi bi-tags-fill text-valoMint text-sm"></i>
                        <h4 class="text-[10px] font-black uppercase tracking-wider text-slate-300">Segmentation analytique</h4>
                    </span>
                    <i class="bi bi-chevron-down text-xs text-valoSlate transition-transform duration-200"></i>
                </button>
                
                <div class="accordion-content">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="space-y-2">
                            <div class="flex justify-between items-center"><span class="text-[8px] font-black uppercase text-valoSlate tracking-widest">Sources d'entrées</span><span id="in-count" class="text-[9px] font-mono text-valoMint font-bold">0/10</span></div>
                            <div id="in-tags" class="grid grid-cols-2 gap-1.5"></div>
                            <div class="flex gap-1.5 pt-1">
                                <input type="text" id="add-in-input" class="flex-grow bg-valoInput border border-slate-800 rounded-xl py-1.5 px-3 text-[11px] text-white focus:outline-none focus:border-valoMint" placeholder="Ajouter entrée...">
                                <button id="btn-add-in" class="px-3 h-8 bg-slate-800 text-valoMint rounded-xl border border-slate-700 text-xs font-bold hover:bg-slate-700 active:scale-95">+</button>
                            </div>
                        </div>
                        <div class="space-y-2">
                            <div class="flex justify-between items-center"><span class="text-[8px] font-black uppercase text-valoSlate tracking-widest">Raisons de sorties</span><span id="out-count" class="text-[9px] font-mono text-red-400 font-bold">0/10</span></div>
                            <div id="out-tags" class="grid grid-cols-2 gap-1.5"></div>
                            <div class="flex gap-1.5 pt-1">
                                <input type="text" id="add-out-input" class="flex-grow bg-valoInput border border-slate-800 rounded-xl py-1.5 px-3 text-[11px] text-white focus:outline-none focus:border-valoMint" placeholder="Ajouter motif...">
                                <button id="btn-add-out" class="px-3 h-8 bg-slate-800 text-red-400 rounded-xl border border-slate-700 text-xs font-bold hover:bg-slate-700 active:scale-95">+</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-valoCard border border-slate-800/50 rounded-2xl p-5 shadow-lg accordion-item transition-all duration-200">
                <button class="w-full flex items-center justify-between text-left outline-none accordion-trigger">
                    <span class="flex items-center gap-2.5">
                        <i class="bi bi-slate bi-shield-lock-fill text-valoMint text-sm"></i>
                        <h4 class="text-[10px] font-black uppercase tracking-wider text-slate-300">Intégrité & Accès Index</h4>
                    </span>
                    <i class="bi bi-chevron-down text-xs text-valoSlate transition-transform duration-200"></i>
                </button>
                
                <div class="accordion-content">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="space-y-3">
                            <div class="space-y-1">
                                <label id="label-q1" class="text-[8px] font-black text-valoSlate uppercase tracking-widest block mb-0.5">Défi Récupération 1</label>
                                <input type="text" id="ans-1" class="w-full bg-valoInput border border-slate-800 rounded-xl py-2 px-3 text-xs text-white focus:outline-none focus:border-valoMint" placeholder="Réponse 1">
                            </div>
                            <div class="space-y-1">
                                <label id="label-q2" class="text-[8px] font-black text-valoSlate uppercase tracking-widest block mb-0.5">Défi Récupération 2</label>
                                <input type="text" id="ans-2" class="w-full bg-valoInput border border-slate-800 rounded-xl py-2 px-3 text-xs text-white focus:outline-none focus:border-valoMint" placeholder="Réponse 2">
                            </div>
                        </div>
                        
                        <div class="flex flex-col justify-between space-y-3">
                            <div class="p-3 bg-slate-950/60 border border-slate-800/60 rounded-xl text-[9px] text-slate-400 font-medium leading-relaxed uppercase">
                                Répondez aux deux défis définis lors de la création pour pouvoir modifier votre clé.
                            </div>
                            
                            <div id="new-key-zone" class="hidden space-y-1">
                                <label class="text-[8px] font-black text-valoMint uppercase tracking-widest block">Nouvelle Clé Secrète (Min. 6 car.)</label>
                                <input type="password" id="new-key" class="w-full bg-slate-950 border border-valoMint/30 rounded-xl py-2 px-3 text-xs font-mono text-white focus:outline-none" placeholder="••••••••">
                            </div>
                            
                            <button id="btn-verify-security" class="w-full bg-valoMint hover:bg-valoMintHover text-valoMidnight font-black py-2.5 rounded-xl text-[10px] uppercase tracking-widest transition-all active:scale-[0.98]">Vérifier les accès</button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        document.querySelectorAll('.accordion-trigger').forEach(trigger => {
            trigger.addEventListener('click', () => {
                const parent = trigger.parentElement;
                const isActive = parent.classList.contains('active');
                
                // Ferme l'autre accordéon actif si nécessaire (Optionnel, pour un effet accordéon classique)
                document.querySelectorAll('.accordion-item').forEach(item => {
                    item.classList.remove('active');
                });
                
                // Bascule l'état actuel
                if (!isActive) {
                    parent.classList.add('active');
                }
            });
        });
    </script>
    <script type="module" src="setting.js"></script>
</body>
</html>
