<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VALO — Centre de Configuration</title>
    
    <link rel="icon" type="image/x-icon" href="../icons/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../icons/favicon-32x32.png">
    <link rel="apple-touch-icon" href="../icons/apple-touch-icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        valoMidnight: '#020617',
                        valoMint: '#10B981',
                        valoMintHover: '#059669',
                        valoSlate: '#475569',
                        valoCard: '#0F172A',
                        valoInput: '#020617'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        .profile-mesh { background: radial-gradient(circle at 100% 0%, rgba(16, 185, 129, 0.1), transparent 60%); }
        .glass-premium { background: linear-gradient(135deg, rgba(15, 23, 42, 0.6) 0%, rgba(15, 23, 42, 0.9) 100%); }

        /* ================= LOGIQUE EXCLUSIVE DES COMPORTEMENTS SÉPARÉS ================= */
        @media (max-width: 767px) {
            /* Sur mobile : masquer le contenu par défaut et animer */
            .accordion-content { 
                max-height: 0; 
                overflow: hidden; 
                transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1); 
                opacity: 0; 
            }
            .accordion-item.active .accordion-content { 
                max-height: 2000px; 
                opacity: 1; 
                padding-top: 20px;
            }
            .accordion-item.active .bi-chevron-down { 
                transform: rotate(180deg); 
                color: #10B981; 
            }
            .accordion-item.active {
                border-color: rgba(16, 185, 129, 0.3) !important;
                background: rgba(15, 23, 42, 1);
            }
        }

        @media (min-width: 768px) {
            /* Sur PC : Forcer l'affichage déplié quoi qu'il arrive et désactiver les chevrons */
            .accordion-content { 
                max-height: none !important; 
                opacity: 1 !important; 
                display: block !important;
                padding-top: 20px;
            }
            .bi-chevron-down { display: none !important; }
            .accordion-trigger { cursor: default !important; pointer-events: none; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="bg-valoMidnight text-slate-200 min-h-full p-4 md:p-12 select-none antialiased flex justify-center items-start">

    <div class="w-full max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-12 gap-6 lg:gap-8 items-start">
        
        <div class="md:col-span-4 space-y-4 md:sticky md:top-12">
            <div class="flex items-center justify-between py-1">
                <button onclick="window.location.href='../dashboard.html'" class="w-10 h-10 flex items-center justify-center rounded-2xl bg-slate-900/80 border border-slate-800/80 text-valoSlate hover:text-white transition-all active:scale-95 shadow-lg">
                    <i class="bi bi-arrow-left text-base"></i>
                </button>
                <h1 class="text-[9px] font-black uppercase tracking-[0.4em] text-valoSlate font-mono">VALO_PROFIL</h1>
                <div class="w-10"></div>
            </div>

            <div class="glass-premium border border-slate-800/80 rounded-[2rem] p-6 relative overflow-hidden profile-mesh shadow-2xl backdrop-blur-md">
                <div class="flex flex-col items-center text-center space-y-4 relative z-10">
                    <div class="relative group">
                        <div class="absolute inset-0 bg-valoMint/20 rounded-3xl blur-md opacity-50 group-hover:opacity-100 transition-opacity"></div>
                        <img id="set-avatar" src="../valo.png" class="w-24 h-24 rounded-[1.75rem] border-2 border-slate-700/50 shadow-2xl object-cover relative z-10 transition-transform group-hover:scale-[1.02]" alt="Avatar">
                        <label for="file-avatar" class="absolute -bottom-1 -right-1 bg-valoMint text-valoMidnight w-7 h-7 rounded-xl flex items-center justify-center cursor-pointer shadow-xl active:scale-90 transition-transform z-20 border border-slate-950">
                            <i class="bi bi-camera-fill text-xs"></i>
                        </label>
                        <input type="file" id="file-avatar" class="hidden" accept="image/*">
                    </div>
                    <div class="space-y-1 w-full min-w-0">
                        <h2 id="set-fullname" class="text-lg font-black tracking-tight text-white truncate">Chargement...</h2>
                        <div class="inline-flex items-center bg-valoMint/5 border border-valoMint/10 rounded-full px-3 py-0.5">
                            <p id="set-username" class="text-[9px] font-bold text-valoMint uppercase tracking-widest font-mono truncate">@username</p>
                        </div>
                        <p id="set-email" class="text-[11px] text-slate-500 font-medium truncate pt-1.5"></p>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-2.5 mt-6 pt-5 border-t border-slate-800/60">
                    <div class="bg-slate-950/60 rounded-2xl p-3 border border-slate-800/40 text-center">
                        <span class="text-[7px] uppercase font-black text-valoSlate tracking-widest block mb-1">Indexation</span>
                        <span id="set-joined" class="text-[11px] font-mono text-slate-300 font-bold">--/--/----</span>
                    </div>
                    <div class="bg-slate-950/60 rounded-2xl p-3 border border-slate-800/40 text-center">
                        <span class="text-[7px] uppercase font-black text-valoSlate tracking-widest block mb-1">Statut</span>
                        <span class="text-[10px] font-bold text-valoMint uppercase flex items-center justify-center gap-1.5"><i class="bi bi-shield-check-fill text-xs"></i> Validé</span>
                    </div>
                </div>
            </div>

            <button id="btn-logout-settings" class="w-full py-4 bg-slate-950/40 hover:bg-red-500/10 border border-slate-900/60 rounded-2xl text-[9px] font-black uppercase tracking-[0.3em] text-red-400/50 hover:text-red-400 transition-all active:scale-[0.99] shadow-inner">
                Clôturer l'accès d'index
            </button>
        </div>

        <div class="md:col-span-8 grid grid-cols-1 md:grid-cols-2 gap-4">
            
            <div class="bg-valoCard border border-slate-800/60 rounded-[1.75rem] p-5 shadow-xl accordion-item transition-all duration-300">
                <button class="w-full flex items-center justify-between text-left outline-none accordion-trigger">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-xl bg-slate-950 flex items-center justify-center border border-slate-800/60">
                            <i class="bi bi-currency-exchange text-valoMint"></i>
                        </div>
                        <h4 class="text-[10px] font-black uppercase tracking-widest text-slate-200">Taux indicatif</h4>
                    </div>
                    <i class="bi bi-chevron-down text-sm text-valoSlate transition-transform duration-300"></i>
                </button>
                
                <div class="accordion-content space-y-4">
                    <div class="h-[1px] bg-slate-800/40 hidden md:block"></div>
                    <p class="text-[10px] text-slate-500 leading-normal">Configuration du taux pivot CDF appliqué aux transactions de l'index.</p>
                    <div class="flex gap-2">
                        <div class="flex-grow space-y-1.5">
                            <label class="text-[8px] font-black text-valoSlate uppercase tracking-wider ml-1">1 USD ($) =</label>
                            <input type="number" id="set-rate" class="w-full bg-slate-950 border border-slate-800 rounded-xl py-3 px-3 text-xs font-mono text-white focus:outline-none focus:border-valoMint transition-colors" placeholder="Ex: 2850">
                        </div>
                        <div class="space-y-1.5 w-1/3">
                            <label class="text-[8px] font-black text-valoSlate uppercase tracking-wider ml-1">Index</label>
                            <select id="set-period" class="w-full h-[46px] bg-slate-950 border border-slate-800 rounded-xl px-2 text-[10px] font-bold text-white focus:outline-none appearance-none text-center">
                                <option value="daily">Jour</option>
                                <option value="weekly">Semaine</option>
                                <option value="fixed">Fixe</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-valoCard border border-slate-800/60 rounded-[1.75rem] p-5 shadow-xl accordion-item transition-all duration-300">
                <button class="w-full flex items-center justify-between text-left outline-none accordion-trigger">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-xl bg-slate-950 flex items-center justify-center border border-slate-800/60">
                            <i class="bi bi-people-fill text-valoMint"></i>
                        </div>
                        <h4 class="text-[10px] font-black uppercase tracking-widest text-slate-200">Partenaires Récurrents</h4>
                    </div>
                    <i class="bi bi-chevron-down text-sm text-valoSlate transition-transform duration-300"></i>
                </button>
                
                <div class="accordion-content space-y-4">
                    <div class="h-[1px] bg-slate-800/40 hidden md:block"></div>
                    <div id="set-partners-list" class="space-y-1.5 max-h-36 overflow-y-auto pr-1"></div>
                    <div class="flex gap-2 pt-1">
                        <input type="text" id="add-partner-input" class="flex-grow bg-slate-950 border border-slate-800 rounded-xl py-2.5 px-3 text-xs text-white focus:outline-none focus:border-valoMint transition-colors" placeholder="Nom du contact...">
                        <button id="btn-add-partner" class="w-10 h-10 bg-valoMint hover:bg-valoMintHover text-valoMidnight rounded-xl flex items-center justify-center shrink-0 active:scale-95 transition-all shadow-md"><i class="bi bi-plus-lg text-base font-bold"></i></button>
                    </div>
                </div>
            </div>

            <div class="bg-valoCard border border-slate-800/60 rounded-[1.75rem] p-5 shadow-xl accordion-item transition-all duration-300 md:col-span-2">
                <button class="w-full flex items-center justify-between text-left outline-none accordion-trigger">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-xl bg-slate-950 flex items-center justify-center border border-slate-800/60">
                            <i class="bi bi-tags-fill text-valoMint"></i>
                        </div>
                        <h4 class="text-[10px] font-black uppercase tracking-widest text-slate-200">Rubriques Analytiques</h4>
                    </div>
                    <i class="bi bi-chevron-down text-sm text-valoSlate transition-transform duration-300"></i>
                </button>
                
                <div class="accordion-content">
                    <div class="h-[1px] bg-slate-800/40 hidden md:block mb-5"></div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-3">
                            <div class="flex justify-between items-center bg-slate-950/40 p-2 rounded-xl border border-slate-800/40"><span class="text-[8px] font-black uppercase text-valoSlate tracking-widest px-1">Sources d'entrées</span><span id="in-count" class="text-[9px] font-mono text-valoMint font-black bg-valoMint/10 px-2 py-0.5 rounded-md">0/10</span></div>
                            <div id="in-tags" class="grid grid-cols-2 gap-1.5"></div>
                            <div class="flex gap-1.5 pt-1">
                                <input type="text" id="add-in-input" class="flex-grow bg-slate-950 border border-slate-800 rounded-xl py-2 px-3 text-[11px] text-white focus:outline-none focus:border-valoMint" placeholder="Ajouter entrée...">
                                <button id="btn-add-in" class="px-3 h-9 bg-slate-800 text-valoMint rounded-xl border border-slate-700 text-xs font-bold hover:bg-slate-700 active:scale-95 transition-colors">+</button>
                            </div>
                        </div>
                        <div class="space-y-3">
                            <div class="flex justify-between items-center bg-slate-950/40 p-2 rounded-xl border border-slate-800/40"><span class="text-[8px] font-black uppercase text-valoSlate tracking-widest px-1">Motifs de sorties</span><span id="out-count" class="text-[9px] font-mono text-red-400 font-black bg-red-500/10 px-2 py-0.5 rounded-md">0/10</span></div>
                            <div id="out-tags" class="grid grid-cols-2 gap-1.5"></div>
                            <div class="flex gap-1.5 pt-1">
                                <input type="text" id="add-out-input" class="flex-grow bg-slate-950 border border-slate-800 rounded-xl py-2 px-3 text-[11px] text-white focus:outline-none focus:border-valoMint" placeholder="Ajouter motif...">
                                <button id="btn-add-out" class="px-3 h-9 bg-slate-800 text-red-400 rounded-xl border border-slate-700 text-xs font-bold hover:bg-slate-700 active:scale-95 transition-colors">+</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-valoCard border border-slate-800/60 rounded-[1.75rem] p-5 shadow-xl accordion-item transition-all duration-300 md:col-span-2">
                <button class="w-full flex items-center justify-between text-left outline-none accordion-trigger">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-xl bg-slate-950 flex items-center justify-center border border-slate-800/60">
                            <i class="bi bi-shield-lock-fill text-valoMint"></i>
                        </div>
                        <h4 class="text-[10px] font-black uppercase tracking-widest text-slate-200">Validation Clé de Sécurité</h4>
                    </div>
                    <i class="bi bi-chevron-down text-sm text-valoSlate transition-transform duration-300"></i>
                </button>
                
                <div class="accordion-content">
                    <div class="h-[1px] bg-slate-800/40 hidden md:block mb-5"></div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="space-y-3">
                            <div class="space-y-1.5">
                                <label id="label-q1" class="text-[8px] font-black text-valoSlate uppercase tracking-widest block ml-1">Défi Récupération 1</label>
                                <input type="text" id="ans-1" class="w-full bg-slate-950 border border-slate-800 rounded-xl py-2.5 px-3 text-xs text-white focus:outline-none focus:border-valoMint" placeholder="Réponse 1">
                            </div>
                            <div class="space-y-1.5">
                                <label id="label-q2" class="text-[8px] font-black text-valoSlate uppercase tracking-widest block ml-1">Défi Récupération 2</label>
                                <input type="text" id="ans-2" class="w-full bg-slate-950 border border-slate-800 rounded-xl py-2.5 px-3 text-xs text-white focus:outline-none focus:border-valoMint" placeholder="Réponse 2">
                            </div>
                        </div>
                        
                        <div class="flex flex-col justify-between space-y-4">
                            <div class="p-3 bg-slate-950/80 border border-slate-800/60 rounded-xl text-[9px] text-slate-400 font-bold leading-relaxed uppercase font-mono">
                                [Alerte] Remplissez vos clés d'index pour déverrouiller l'accès de mise à jour.
                            </div>
                            
                            <div id="new-key-zone" class="hidden space-y-1.5">
                                <label class="text-[8px] font-black text-valoMint uppercase tracking-widest block ml-1">Nouvelle Clé Secrète</label>
                                <input type="password" id="new-key" class="w-full bg-slate-950 border border-valoMint/40 rounded-xl py-2.5 px-3 text-xs font-mono text-white focus:outline-none focus:border-valoMint" placeholder="••••••••">
                            </div>
                            
                            <button id="btn-verify-security" class="w-full bg-valoMint hover:bg-valoMintHover text-valoMidnight font-black py-3 rounded-xl text-[10px] uppercase tracking-widest transition-all active:scale-[0.97] shadow-lg shadow-valoMint/10">Vérifier l'autorisation</button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        document.querySelectorAll('.accordion-trigger').forEach(trigger => {
            trigger.addEventListener('click', () => {
                // Bloquer l'exécution si on est sur grand écran
                if (window.innerWidth >= 768) return;

                const item = trigger.parentElement;
                const isOpen = item.classList.contains('active');

                // Fermer l'ancien volet
                document.querySelectorAll('.accordion-item').forEach(el => el.classList.remove('active'));

                // Si le volet cliqué n'était pas ouvert, on l'ouvre
                if (!isOpen) {
                    item.classList.add('active');
                    setTimeout(() => {
                        item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }, 300);
                }
            });
        });
    </script>
    <script type="module" src="setting.js"></script>
</body>
</html>
