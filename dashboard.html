<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VALO - Tableau de Bord</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        valoMidnight: '#0F172A',
                        valoMint: '#10B981',
                        valoMintHover: '#059669',
                        valoSlate: '#64748B',
                        valoCard: '#1E293B',
                        valoCrimson: '#EF4444',
                        valoCrimsonHover: '#DC2626'
                    }
                }
            }
        }
    </script>
    <link rel="manifest" href="manifest.json">
    <style>
        /* Fige le header uniquement sur mobile */
        @media (max-width: 767px) {
            .mobile-header-fixed {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                height: 65px;
                background-color: rgba(15, 23, 42, 0.9);
                backdrop-filter: blur(8px);
                z-index: 40;
                border-bottom: 1px solid rgba(30, 41, 59, 0.8);
                padding: 0 16px;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            /* Décale le contenu de la page pour ne pas être caché sous le header */
            main {
                padding-top: 80px !important;
            }
        }
    </style>
</head>
<body class="bg-valoMidnight text-white h-full font-sans antialiased flex flex-col md:flex-row pb-16 md:pb-0">

    <nav class="hidden md:flex bg-valoCard border-r border-slate-800/60 w-64 flex-col justify-between p-6 shrink-0 z-20">
        <div class="flex flex-col items-start gap-4 w-full space-y-8">
            <img src="lat_valo.png" alt="VALO" class="h-7 w-auto object-contain">
            <div class="flex flex-col gap-2 w-full">
                <a href="#" class="flex items-center gap-3 bg-slate-800 text-valoMint font-medium px-4 py-3 rounded-xl transition">
                    <i class="bi bi-grid-1x2-fill"></i> Vue globale
                </a>
                <a href="#" class="flex items-center gap-3 text-valoSlate hover:text-white font-medium px-4 py-3 rounded-xl transition">
                    <i class="bi bi-arrow-left-right"></i> Transactions
                </a>
                <a href="#" class="flex items-center gap-3 text-valoSlate hover:text-white font-medium px-4 py-3 rounded-xl transition">
                    <i class="bi bi-pie-chart-fill"></i> Budgets
                </a>
            </div>
        </div>

        <div class="flex items-center justify-between w-full pt-4 border-t border-slate-800/80">
            <div class="flex items-center gap-2.5 text-left">
                <div class="w-9 h-9 rounded-full bg-valoMint/10 border border-valoMint/30 flex items-center justify-center text-valoMint font-bold md-avatar">-</div>
                <div>
                    <p class="text-sm font-semibold tracking-tight profile-name">...</p>
                    <span class="text-[10px] text-valoMint uppercase tracking-wider font-medium">Porte-monnaie</span>
                </div>
            </div>
            <button class="btn-logout text-valoSlate hover:text-valoCrimson text-xl p-2 rounded-lg transition">
                <i class="bi bi-box-arrow-right"></i>
            </button>
        </div>
    </nav>

    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-valoCard/95 backdrop-blur-lg border-t border-slate-800/80 flex justify-around items-center py-2 px-4 z-30 shadow-2xl">
        <a href="#" class="flex flex-col items-center gap-0.5 text-valoMint text-xs font-semibold px-3 py-1">
            <i class="bi bi-grid-1x2-fill text-lg"></i><span>Global</span>
        </a>
        <a href="#" class="flex flex-col items-center gap-0.5 text-valoSlate text-xs">
            <i class="bi bi-arrow-left-right text-lg"></i><span>Flux</span>
        </a>
        <button class="btn-logout flex flex-col items-center gap-0.5 text-valoSlate text-xs">
            <i class="bi bi-box-arrow-right text-lg"></i><span>Sortie</span>
        </button>
    </nav>

    <main class="flex-grow p-4 md:p-8 lg:p-10 space-y-6 overflow-y-auto max-w-7xl mx-auto w-full">
            
            <div class="mobile-header-fixed flex items-center justify-between">
                <div class="flex items-center gap-2.5">
                    <a href="./profil/setting.html" class="block relative transition-transform active:scale-95 shrink-0">
                        <img id="user-avatar-mobile" src="valo.png" alt="Profil" class="w-9 h-9 rounded-full object-cover border border-slate-700">
                        <span class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-valoMint border-2 border-valoMidnight rounded-full"></span>
                    </a>
                    <div>
                        <h1 class="text-sm md:text-2xl font-black tracking-tight leading-tight">Bonjour, <span class="text-valoMint" id="welcome-name">...</span></h1>
                        <p class="text-valoSlate text-[10px] md:text-sm leading-none mt-0.5">Voici l'état actuel de vos finances.</p>
                    </div>
                </div>
                
                <div class="relative flex items-center bg-slate-800 border border-slate-700/50 rounded-full px-2.5 py-1 md:px-3 md:py-1.5 gap-1.5 text-[10px] md:text-xs font-mono">
                    <i class="bi bi-calendar3 text-valoMint"></i>
                    <select id="global-range-filter" class="bg-transparent text-slate-300 font-bold focus:outline-none cursor-pointer">
                        <option value="month" id="opt-current-month" class="bg-slate-900">Ce mois</option>
                        <option value="year" class="bg-slate-900">Année entière</option>
                    </select>
                </div>
            </div>

        <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
            <div class="col-span-2 md:col-span-1 bg-gradient-to-br from-valoCard to-slate-900 border border-slate-800 p-4 rounded-xl shadow-xl flex flex-col justify-between min-h-[100px] md:min-h-[140px]">
                <span class="text-[10px] md:text-xs text-valoSlate font-semibold uppercase tracking-wider">Solde Total</span>
                <h2 class="text-xl md:text-3xl font-mono font-bold tracking-tight" id="total-balance">0,00 $</h2>
            </div>
        
            <div class="bg-valoCard border border-slate-800/60 p-4 rounded-xl flex flex-col justify-between min-h-[100px] md:min-h-[140px]">
                <span class="text-[10px] md:text-xs text-valoSlate font-semibold uppercase tracking-wider">Entrées</span>
                <h2 class="text-base md:text-2xl font-mono font-bold text-slate-100" id="monthly-income">0,00 $</h2>
            </div>
        
            <div class="bg-valoCard border border-slate-800/60 p-4 rounded-xl flex flex-col justify-between min-h-[100px] md:min-h-[140px]">
                <span class="text-[10px] md:text-xs text-valoSlate font-semibold uppercase tracking-wider">Sorties</span>
                <h2 class="text-base md:text-2xl font-mono font-bold text-slate-100" id="monthly-expenses">0,00 $</h2>
            </div>
        </div>
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-1 space-y-4">
                <h3 class="text-sm font-bold uppercase text-valoSlate">Opérations Rapides</h3>
                <div class="bg-valoCard border border-slate-800/60 rounded-2xl p-5 grid grid-cols-2 lg:grid-cols-1 gap-3">
                    <button id="btn-open-revenu" class="w-full bg-valoMint hover:bg-valoMintHover text-valoMidnight font-bold py-3 rounded-xl text-sm flex items-center justify-center gap-2">
                        <i class="bi bi-plus-circle-fill"></i> Revenu
                    </button>
                    <button id="btn-open-sortie" class="w-full bg-slate-800 hover:bg-slate-700 text-white border border-slate-700 font-bold py-3 rounded-xl text-sm flex items-center justify-center gap-2">
                        <i class="bi bi-dash-circle-fill text-valoCrimson"></i> Dépense
                    </button>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-4">
                <h3 class="text-sm font-bold uppercase text-valoSlate">Flux Récents</h3>
                <div class="bg-valoCard border border-slate-800/60 rounded-2xl overflow-hidden divide-y divide-slate-800/80" id="transactions-list"></div>
            </div>
        </div>
    </main>

    <div id="modal-container"></div>

    <script type="module" src="./js/dashboard.js"></script>
</body>
</html>
